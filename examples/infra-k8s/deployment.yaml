apiVersion: apps/v1
kind: Deployment
metadata:
  name: standalone-service
  labels:
    app: standalone-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: standalone-service
  template:
    metadata:
      labels:
        app: standalone-service
    spec:
      containers:
        - name: standalone-service
          image: my-registry/standalone-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            # Explicitly identify Pod for AI Monitor
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: standalone-service
spec:
  type: ClusterIP
  selector:
    app: standalone-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
